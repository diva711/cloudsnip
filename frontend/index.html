<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudSnip — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="brand">
      <div class="brand-icon">✂️</div>
      CloudSnip
    </div>
    <div class="user-info">
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>
  </div>

  <div class="container">

    <!-- URL SHORTENER BOX -->
    <div class="shortener-box">
      <h2>Shorten a URL</h2>

      <div class="form-group">
        <label>Long URL</label>
        <input type="url" id="longUrl" placeholder="https://example.com/your/very/long/link">
      </div>

      <div class="form-group">
        <label>Short URL</label>
        <div class="url-row">
          <input type="text" id="shortUrl" placeholder="Your short link will appear here" readonly>
          <button class="copy-btn" id="copyBtn" onclick="copyShortUrl()">Copy</button>
        </div>
      </div>

      <button onclick="shortenURL()">Shorten URL</button>
      <div id="shortenMessage" class="message"></div>
    </div>

    <!-- LINK HISTORY -->
    <div class="history-box">
      <div class="section-header">
        <h2>Link History</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>Long URL</th>
            <th>Short Code</th>
            <th>Clicks</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr>
            <td colspan="4" class="empty-state">No links yet. Shorten your first URL above.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- RECENT CLICKS -->
    <div class="history-box">
      <div class="section-header">
        <h2>Recent Clicks</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>Short Code</th>
            <th>IP Address</th>
            <th>Clicked At</th>
          </tr>
        </thead>
        <tbody id="recentClicks">
          <tr>
            <td colspan="3" class="empty-state">No clicks yet. Share your links to see activity here.</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/links.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    redirectIfNotLoggedIn();
    loadHistory();
    loadRecentClicks();
  </script>

</body>
</html>
